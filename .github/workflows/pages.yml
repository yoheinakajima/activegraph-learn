name: Deploy to GitHub Pages

# Deploys the static site on every push to the default branch, and lets you
# trigger a deploy by hand from the Actions tab. No build step — the repo root
# is uploaded as-is. Make this live with a single one-time setting:
#   Settings -> Pages -> Build and deployment -> Source -> "GitHub Actions"

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; let a newer push cancel an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true   # turn Pages on (Actions build type) if it isn't already

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .          # the whole repo root is the site (static, no build)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
